<!-- Mobile Dropdown Logic -->
<script>
(function() {
  // Toggle dropdown on mobile click
  document.addEventListener('click', function(e) {
    if (window.innerWidth > 768) return;

    var dropdown = e.target.closest('.dropdown');

    if (dropdown) {
      // Allow clicks on links inside dropdown-content to navigate
      if (e.target.closest('.dropdown-content a') || e.target.closest('.nested-trigger')) return;

      e.preventDefault();

      var isOpen = dropdown.classList.contains('open');

      // Close all open dropdowns
      document.querySelectorAll('.dropdown.open').forEach(function(d) {
        d.classList.remove('open');
      });

      // Open this one if it was closed
      if (!isOpen) {
        dropdown.classList.add('open');
      }
    } else {
      // Clicked outside — close all
      document.querySelectorAll('.dropdown.open').forEach(function(d) {
        d.classList.remove('open');
      });
    }
  });
})();

// Mobile nested dropdown trigger logic
(function() {
  document.addEventListener('click', function(e) {
    if (window.innerWidth > 768) return;
    
    var trigger = e.target.closest('.nested-trigger');
    if (trigger) {
      e.preventDefault();
      e.stopPropagation();
      var nestedDropdown = trigger.closest('.nested-dropdown');
      if (nestedDropdown) {
        nestedDropdown.classList.toggle('open');
      }
    }
  });
})();
</script>
